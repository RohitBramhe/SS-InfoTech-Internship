<!DOCTYPE html>
<html>

<head>
    <title>Student Registration Form</title>
</head>

<body>

    <body style="background-color: rgb(222, 179, 186);">

        <h2>Student Registration Form</h2>

        <form>
            <label>Roll Number:</label>
            <input type="text" style="margin-left:70px;">
            <br><br>

            <label>Student Name:</label>
            <input type="text" style="margin-left:60px;">
            <br><br>

            <label>Father's Name:</label>
            <input type="text" style="margin-left:60px;">
            <br><br>

            <label>Date of Birth:</label>
            <input type="date" style="margin-left:65px;">
            <br><br>

            <label>Email:</label>
            <input type="email" style="margin-left:100px;">
            <br><br>

            <label>Password:</label>
            <input type="password" style="margin-left:78px;">
            <br><br>

            <label style="margin-right:80px;">
                Gender:
            </label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other
            <br><br>

            <label style="margin-right:58px;"> Department:</label>

            <input type="checkbox"> CSE
            <input type="checkbox"> IT
            <input type="checkbox"> ECE
            <input type="checkbox"> Civil
            <input type="checkbox"> Mech
            <br><br>

            <label>Course:</label>
            <select name="course" style="margin-left:98px;">
                <option>--------------------Select Current Course's --------------------- </option>
                <option>B.Tech</option>
                <option>BSc</option>
                <option>MCA</option>
                <option>MBA</option>
            </select>
            <br><br>

            <label style="margin-right:50px;">Student Photo:</label>
            <input type="file" name="photo"><br><br>

            <label>City:</label>
            <input type="text" name="city" style="margin-left:110px;"><br><br>

            <label>Address:</label>
            <textarea name="address" rows="5" cols="46" style="margin-left:85px;"></textarea>
            <br><br>

            <center>
                <button type="submit">Register</button>
            </center>

        </form>

        <script src="inigration.js"></script>
    </body>

</html>
