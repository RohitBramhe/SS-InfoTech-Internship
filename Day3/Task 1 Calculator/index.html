<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input id="screen" class="screen" type="text" readonly value="0">

        <div class="buttons">
            <button class="clear" addvalue="C">C</button>
            <button class="delete" addvalue="DEL">DEL</button>
            <button class="operator" addvalue="/">/</button>
            <button class="operator" addvalue="*">*</button>
            <button class="operator" addvalue="-">-</button>

            <button addvalue="7">7</button>
            <button addvalue="8">8</button>
            <button addvalue="9">9</button>
            <button class="operator" addvalue="+">+</button

            <button addvalue="4">4</button>
            <button addvalue="5">5</button>
            <button addvalue="6">6</button>
            <button addvalue=".">.</button>

            <button addvalue="1">1</button>
            <button addvalue="2">2</button>
            <button addvalue="3">3</button>
            <button class="equal" addvalue="=">=</button>

            <button class="zero" addvalue="0">0</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
